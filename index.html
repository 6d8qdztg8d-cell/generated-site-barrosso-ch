<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Barrosso.ch</title>
    <style>
        body {
            margin: 0;
            background-color: #0F0F0E;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', Helvetica, Arial, sans-serif;
            color: white;
            max-width: 430px;
            margin: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header,
        .hero-card,
        .quick-actions,
        .info-card,
        .about,
        .social-links,
        .footer {
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn ease-out 1s forwards;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #C8FF00;
            color: #0F0F0E;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .badge {
            background-color: #C8FF00;
            color: #0F0F0E;
            border-radius: 14px;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }

        .hero-card {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 80px rgba(200, 255, 0, 0.1);
        }

        .hero-card h1 {
            font-size: 28px;
            margin: 0;
            color: #C8FF00;
        }

        .hero-card p {
            color: rgba(255, 255, 255, 0.5);
            margin: 10px 0 0;
        }

        .quick-actions {
            display: flex;
            justify-content: space-between;
        }

        .quick-actions a {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            margin: 0 5px;
            text-decoration: none;
            border-radius: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, transform 0.3s;
        }

        .quick-actions a:nth-child(1) {
            background-color: #C8FF00;
            color: #0F0F0E;
        }

        .quick-actions a:nth-child(2) {
            background-color: #1c1c1b;
            color: white;
        }

        .quick-actions a:hover {
            transform: translateY(-2px);
        }

        .info-card {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            padding: 10px 0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .about {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 15px;
            color: rgba(255, 255, 255, 0.5);
        }

        .social-links a {
            display: inline-block;
            text-decoration: none;
            background-color: #C8FF00;
            color: #0F0F0E;
            padding: 5px 15px;
            border-radius: 14px;
            margin: 5px 0;
            transition: background-color 0.3s;
        }

        .social-links a:hover {
            background-color: #a0ff00;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="avatar">B</div>
        <div>Barrosso.ch</div>
        <span class="badge">Category</span>
    </header>

    <div class="hero-card">
        <h1>Welcome to Barrosso.ch</h1>
        <p>Your gateway to the best experiences.</p>
    </div>

    <div class="quick-actions">
        <a href="#contact" style="margin-left: 0;">Contact Us</a>
        <a href="#subscribe" style="margin-right: 0;">Subscribe</a>
    </div>

    <div class="info-card">
        <div class="info-item">
            <span>📍 Address</span>
            <a href="https://maps.google.com" target="_blank" rel="noopener" style="color: #C8FF00;">Maps</a>
        </div>
        <div class="info-item">
            <span>🕒 Hours</span>
            <span>9am - 5pm</span>
        </div>
        <div class="info-item">
            <span>📞 Phone/Email</span>
            <span>(123) 456-7890</span>
        </div>
    </div>

    <div class="about">
        <p>About Barrosso.ch: We are dedicated to providing the best service in the industry...</p>
    </div>

    <div class="social-links">
        <a href="https://facebook.com" target="_blank" rel="noopener">Facebook</a>
        <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
    </div>

    <footer class="footer">
        Powered by DigitalFrame
    </footer>
</body>

</html>
